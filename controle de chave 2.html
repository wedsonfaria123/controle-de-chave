<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FEPI - Controle de Chaves</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --azul:#002d72;
    --azul-claro:#0b57d0;
    --amarelo:#ffc400;
    --fundo:#f3f7fc;
    --card:#ffffff;
    --texto:#1f2937;
    --sombra:0 12px 30px rgba(0,0,0,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--fundo);
    color:var(--texto);
}

/* CABEÇALHO */

.header{
    background:linear-gradient(135deg,var(--azul),var(--azul-claro));
    color:#fff;
    padding:30px 20px;
    border-bottom:5px solid var(--amarelo);
    box-shadow:var(--sombra);
}

.header-content{
    max-width:1200px;
    margin:auto;
    display:flex;
    align-items:center;
    gap:25px;
}

.logo-fepi{
    width:120px;
    height:auto;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.25));
}

.header-texto h1{
    font-size:2rem;
    font-weight:700;
    margin-bottom:8px;
}

.header-texto p{
    color:var(--amarelo);
    font-size:1.2rem;
    font-weight:500;
}

/* CONTEÚDO */

.container{
    max-width:1200px;
    margin:30px auto;
    padding:0 20px;
}

.grid-info{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.info-card{
    background:var(--card);
    border-radius:20px;
    padding:25px;
    box-shadow:var(--sombra);
    border-top:5px solid var(--amarelo);
}

.info-card h2{
    color:var(--azul);
    font-size:2rem;
}

.info-card span{
    color:#64748b;
}

.card{
    background:var(--card);
    border-radius:20px;
    padding:25px;
    box-shadow:var(--sombra);
    margin-bottom:25px;
}

.card h3{
    color:var(--azul);
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:2fr 2fr 1fr;
    gap:15px;
}

input{
    width:100%;
    padding:14px;
    border:2px solid #e5e7eb;
    border-radius:12px;
    outline:none;
    transition:.2s;
}

input:focus{
    border-color:var(--amarelo);
}

button{
    border:none;
    border-radius:12px;
    padding:14px 18px;
    cursor:pointer;
    font-weight:600;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

.btn-primary{
    background:var(--amarelo);
    color:var(--azul);
}

.btn-retirar{
    background:var(--azul);
    color:#fff;
}

.btn-devolver{
    background:#16a34a;
    color:#fff;
}

.btn-excluir{
    background:#dc2626;
    color:#fff;
}

.search{
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th{
    background:var(--azul);
    color:#fff;
    padding:15px;
    text-align:left;
}

td{
    padding:15px;
    border-bottom:1px solid #eef2f7;
}

tr:hover{
    background:#f8fbff;
}

.status{
    padding:6px 12px;
    border-radius:30px;
    font-size:12px;
    font-weight:600;
}

.disponivel{
    background:#dcfce7;
    color:#166534;
}

.emprestada{
    background:#fee2e2;
    color:#b91c1c;
}

.acoes{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.sem-registros{
    text-align:center;
    color:#64748b;
    padding:30px;
}

/* RODAPÉ */

.footer{
    margin-top:40px;
    background:linear-gradient(135deg,#002d72,#001f4d);
    border-top:4px solid var(--amarelo);
    padding:25px;
    text-align:center;
    color:#fff;
}

.footer img{
    width:60px;
    margin-bottom:10px;
}

.footer p{
    font-size:18px;
    margin-bottom:5px;
}

.footer strong{
    color:var(--amarelo);
}

.footer span{
    color:rgba(255,255,255,.8);
    font-size:14px;
}

/* RESPONSIVO */

@media(max-width:768px){

    .header-content{
        flex-direction:column;
        text-align:center;
    }

    .logo-fepi{
        width:90px;
    }

    .header-texto h1{
        font-size:1.5rem;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    table, thead, tbody, th, td, tr{
        display:block;
    }

    thead{
        display:none;
    }

    tr{
        margin-bottom:15px;
        border:1px solid #e5e7eb;
        border-radius:15px;
        overflow:hidden;
    }

    td{
        display:flex;
        justify-content:space-between;
    }

    td::before{
        font-weight:600;
        color:var(--azul);
    }

    td:nth-child(1)::before{content:"Código";}
    td:nth-child(2)::before{content:"Local";}
    td:nth-child(3)::before{content:"Responsável";}
    td:nth-child(4)::before{content:"Retirada";}
    td:nth-child(5)::before{content:"Status";}
    td:nth-child(6)::before{content:"Ações";}
}
</style>
</head>

<body>

<header class="header">
    <div class="header-content">

        <img src="logo-fepi.png" alt="Logo FEPI" class="logo-fepi">

        <div class="header-texto">
            <h1>FEPI - Centro Universitário de Itajubá</h1>
            <p>Sistema Online de Controle de Chaves</p>
        </div>

    </div>
</header>

<div class="container">

    <div class="grid-info">
        <div class="info-card">
            <h2 id="total">0</h2>
            <span>Total de Chaves</span>
        </div>

        <div class="info-card">
            <h2 id="disponiveis">0</h2>
            <span>Disponíveis</span>
        </div>

        <div class="info-card">
            <h2 id="emprestadas">0</h2>
            <span>Emprestadas</span>
        </div>
    </div>

    <div class="card">
        <h3>➕ Cadastrar Nova Chave</h3>

        <div class="form-grid">
            <input type="text" id="codigo" placeholder="Ex.: LAB-01">
            <input type="text" id="local" placeholder="Ex.: Laboratório de Informática">
            <button class="btn-primary" onclick="cadastrarChave()">
                Cadastrar
            </button>
        </div>

        <div class="search">
            <input type="text" id="pesquisa"
                   placeholder="🔍 Pesquisar por código, local ou responsável..."
                   onkeyup="atualizarTabela()">
        </div>
    </div>

    <div class="card">
        <h3>📋 Lista de Chaves</h3>

        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Local</th>
                    <th>Responsável</th>
                    <th>Retirada</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabela"></tbody>
        </table>
    </div>

</div>

<footer class="footer">
    <img src="logo-fepi.png" alt="Logo FEPI">

    <p>Desenvolvido por <strong>Wedson Faria</strong></p>

    <span>FEPI - Centro Universitário de Itajubá</span>
</footer>

<script>
let chaves = JSON.parse(localStorage.getItem("fepi_chaves")) || [];

function salvar(){
    localStorage.setItem("fepi_chaves", JSON.stringify(chaves));
}

function cadastrarChave(){

    const codigo = document.getElementById("codigo").value.trim();
    const local = document.getElementById("local").value.trim();

    if(!codigo || !local){
        alert("Preencha todos os campos.");
        return;
    }

    const existe = chaves.some(
        c => c.codigo.toLowerCase() === codigo.toLowerCase()
    );

    if(existe){
        alert("Já existe uma chave com este código.");
        return;
    }

    chaves.push({
        id: Date.now(),
        codigo,
        local,
        responsavel:"",
        retirada:"",
        status:"Disponível"
    });

    salvar();

    document.getElementById("codigo").value = "";
    document.getElementById("local").value = "";

    atualizarTabela();
}

function retirar(id){

    const nome = prompt("Informe o nome do responsável:");

    if(!nome) return;

    const chave = chaves.find(c => c.id === id);

    chave.responsavel = nome;
    chave.retirada = new Date().toLocaleString("pt-BR");
    chave.status = "Emprestada";

    salvar();
    atualizarTabela();
}

function devolver(id){

    const chave = chaves.find(c => c.id === id);

    chave.responsavel = "";
    chave.retirada = "";
    chave.status = "Disponível";

    salvar();
    atualizarTabela();
}

function excluir(id){

    if(!confirm("Deseja excluir esta chave?")) return;

    chaves = chaves.filter(c => c.id !== id);

    salvar();
    atualizarTabela();
}

function atualizarTabela(){

    const filtro = document.getElementById("pesquisa").value.toLowerCase();
    const tabela = document.getElementById("tabela");

    tabela.innerHTML = "";

    const filtradas = chaves.filter(chave =>
        chave.codigo.toLowerCase().includes(filtro) ||
        chave.local.toLowerCase().includes(filtro) ||
        chave.responsavel.toLowerCase().includes(filtro)
    );

    if(filtradas.length === 0){
        tabela.innerHTML = `
            <tr>
                <td colspan="6" class="sem-registros">
                    Nenhuma chave encontrada.
                </td>
            </tr>
        `;
    }

    filtradas.forEach(chave => {

        tabela.innerHTML += `
        <tr>
            <td>${chave.codigo}</td>
            <td>${chave.local}</td>
            <td>${chave.responsavel || "-"}</td>
            <td>${chave.retirada || "-"}</td>

            <td>
                <span class="status ${chave.status === 'Disponível' ? 'disponivel' : 'emprestada'}">
                    ${chave.status}
                </span>
            </td>

            <td>
                <div class="acoes">

                ${chave.status === "Disponível"
                    ? `<button class="btn-retirar" onclick="retirar(${chave.id})">Retirar</button>`
                    : `<button class="btn-devolver" onclick="devolver(${chave.id})">Devolver</button>`
                }

                <button class="btn-excluir" onclick="excluir(${chave.id})">
                    Excluir
                </button>

                </div>
            </td>
        </tr>`;
    });

    document.getElementById("total").textContent = chaves.length;

    document.getElementById("disponiveis").textContent =
        chaves.filter(c => c.status === "Disponível").length;

    document.getElementById("emprestadas").textContent =
        chaves.filter(c => c.status === "Emprestada").length;
}

atualizarTabela();
</script>

</body>
</html>
